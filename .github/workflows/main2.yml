name: Build Windows EXE

on:
  workflow_dispatch:   # allows manual trigger from Actions tab
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'   # adjust if you need a different version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyautogui pillow pygetwindow mouseinfo pyscreeze

      - name: Build with PyInstaller
        run: |
          # optional: set --icon=assets/app.ico if you have an .ico in repo
          pyinstaller --onefile --windowed \
            --hidden-import=pyscreeze \
            --hidden-import=mouseinfo \
            --hidden-import=pygetwindow \
            jiggler.py

      - name: List dist folder
        run: dir dist

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiggler-windows-exe
          path: dist/jiggler.exe
