name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path -Path "requirements.txt" -PathType Leaf) {
            pip install -r requirements.txt
          } else {
            Write-Host "No requirements.txt found, skipping."
          }
          pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          $pyArgs = @("--onefile", "--name", "app", "--hidden-import=pyscreeze")
          if (Test-Path "assets/app.ico") {
            $pyArgs += "--icon=assets/app.ico"
          }
          $pyArgs += "app.py"
          pyinstaller @pyArgs

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/app.exe
          if-no-files-found: error
